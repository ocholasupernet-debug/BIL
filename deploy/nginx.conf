##############################################################
# OcholaSupernet — nginx config for isplatty.org
#
# Place at: /etc/nginx/sites-available/isplatty
# Enable:   sudo ln -s /etc/nginx/sites-available/isplatty \
#                      /etc/nginx/sites-enabled/isplatty
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
#
# Replace <cpuser> with your actual CyberPanel Linux username.
# Replace PROJECT_ROOT with: /home/<cpuser>/isplatty.org
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name isplatty.org www.isplatty.org *.isplatty.org;

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    # ── API reverse proxy ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static frontend (React SPA) ────────────────────────
    root /home/<cpuser>/isplatty.org/public_html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache JS/CSS/images aggressively (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html so new deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

