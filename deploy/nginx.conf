##############################################################
# OcholaSupernet — nginx config for VPS deployment
# Place this at: /etc/nginx/sites-available/ocholasupernet
# Then: sudo ln -s /etc/nginx/sites-available/ocholasupernet \
#                  /etc/nginx/sites-enabled/ocholasupernet
# Edit YOUR_DOMAIN and PROJECT_PATH below, then reload nginx.
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Optional: redirect HTTP → HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # ── API reverse proxy ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static frontend (React SPA) ────────────────────────
    root PROJECT_PATH/artifacts/ochola-supernet/dist/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html so new deployments take effect
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

