<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISP Admin Portal — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:#0d1117">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-3" style="background:rgba(6,182,212,0.15);border:1px solid rgba(6,182,212,0.25)">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#06b6d4" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008z"/></svg>
      </div>
      <h1 class="text-xl font-bold text-white" id="portalBrand">ISP Admin Portal</h1>
      <p class="text-slate-500 text-xs mt-1" id="portalSub">Sign in to manage your ISP</p>
    </div>

    <!-- Login form -->
    <div class="rounded-2xl border border-white/8 overflow-hidden" style="background:#161b22">
      <div class="px-6 py-5 border-b border-white/6" style="background:#0d1117">
        <p class="text-sm font-semibold text-white">Administrator Login</p>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="text-xs font-medium text-slate-400 mb-1.5 block">Username</label>
          <input id="username" type="text" placeholder="Enter username" autocomplete="username"
            class="w-full text-sm px-4 py-2.5 rounded-xl border border-white/10 text-slate-200 placeholder-slate-600"
            style="background:#0d1117"/>
        </div>
        <div>
          <label class="text-xs font-medium text-slate-400 mb-1.5 block">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
            class="w-full text-sm px-4 py-2.5 rounded-xl border border-white/10 text-slate-200 placeholder-slate-600"
            style="background:#0d1117"/>
        </div>
        <div id="loginError" class="hidden rounded-xl p-3 border border-red-500/20 text-xs text-red-400" style="background:rgba(239,68,68,0.05)">
          Incorrect username or password.
        </div>
        <button onclick="doLogin()" id="loginBtn"
          class="w-full py-2.5 rounded-xl text-sm font-bold text-white transition" style="background:#0e7490">
          Sign In
        </button>
      </div>
    </div>

    <!-- 2FA panel (hidden) -->
    <div id="twoFaPanel" class="hidden rounded-2xl border border-white/8 overflow-hidden mt-4" style="background:#161b22">
      <div class="p-6 space-y-3">
        <p class="text-sm font-semibold text-white">Two-Factor Authentication</p>
        <p class="text-xs text-slate-400">Enter the 6-digit code from your authenticator app</p>
        <input type="text" maxlength="6" placeholder="000000"
          class="w-full text-center text-xl tracking-widest font-mono px-4 py-3 rounded-xl border border-white/10 text-white placeholder-slate-600"
          style="background:#0d1117"/>
        <button onclick="location.href='admin-dashboard.html'" class="w-full py-2.5 rounded-xl text-sm font-bold text-white" style="background:#0e7490">Verify</button>
      </div>
    </div>

    <p class="text-center text-xs text-slate-700 mt-5">
      Powered by <a href="landing-page.html" class="text-slate-500 hover:text-slate-300 transition">OcholaSupernet</a>
    </p>
  </div>

  <script>
    function doLogin() {
      const u=document.getElementById('username').value;
      const p=document.getElementById('password').value;
      const btn=document.getElementById('loginBtn');
      if(!u||!p) { document.getElementById('loginError').classList.remove('hidden'); return; }
      btn.textContent='Signing in…';
      btn.disabled=true;
      setTimeout(()=>{
        if((u==='admin'&&p==='come')||(u==='yes'&&p==='chris')) {
          location.href='admin-dashboard.html';
        } else {
          document.getElementById('loginError').classList.remove('hidden');
          btn.textContent='Sign In';
          btn.disabled=false;
        }
      },1200);
    }
    document.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  </script>
</body>
</html>
