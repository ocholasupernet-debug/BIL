<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="p-6">
      <div class="flex items-center gap-3 mb-4">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#ef4444" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
        <h1 class="text-2xl font-bold text-gray-900">404 Page Not Found</h1>
      </div>
      <p class="text-sm text-gray-600 mt-4">Did you forget to add the page to the router?</p>
      <button onclick="history.back()" class="mt-6 text-sm text-blue-600 hover:text-blue-800 transition">← Go back</button>
    </div>
  </div>
</body>
</html>
