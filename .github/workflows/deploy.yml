name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: VITE_SUPABASE_URL,VITE_SUPABASE_KEY
          script: |
            set -e
            echo "=== Starting deploy at $(date) ==="
            cd /var/www/ocholasupernet

            # Inject Supabase credentials into .env so PM2 always has them
            # (safe even if already set — idempotent upsert)
            if [ -n "$VITE_SUPABASE_URL" ]; then
              grep -q "^VITE_SUPABASE_URL=" .env 2>/dev/null \
                && sed -i "s|^VITE_SUPABASE_URL=.*|VITE_SUPABASE_URL=$VITE_SUPABASE_URL|" .env \
                || echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
              echo "  ✓ VITE_SUPABASE_URL written to .env"
            fi
            if [ -n "$VITE_SUPABASE_KEY" ]; then
              grep -q "^VITE_SUPABASE_KEY=" .env 2>/dev/null \
                && sed -i "s|^VITE_SUPABASE_KEY=.*|VITE_SUPABASE_KEY=$VITE_SUPABASE_KEY|" .env \
                || echo "VITE_SUPABASE_KEY=$VITE_SUPABASE_KEY" >> .env
              echo "  ✓ VITE_SUPABASE_KEY written to .env"
            fi

            bash deploy/deploy.sh
            echo "=== Deploy finished at $(date) ==="
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
