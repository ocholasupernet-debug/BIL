################################################################
# OcholaSupernet — OpenLiteSpeed Proxy Config  (isplatty.org)
#
# HOW TO APPLY (pick one option):
#
# Option A — CyberPanel Node.js Apps (easiest, recommended):
#   1. CyberPanel → Node.js Apps → Create Application
#   2. App Root:         /home/<cpuser>/isplatty.org/
#   3. App URL:          /api/
#   4. Startup File:     artifacts/api-server/dist/index.mjs
#   5. Environment vars: NODE_ENV=production PORT=8080
#   → CyberPanel creates the OLS proxy automatically.
#
# Option B — Edit vHost config directly:
#   sudo nano /usr/local/lsws/conf/vhosts/isplatty.org/vhost.conf
#   Paste the blocks below, then restart OLS:
#   sudo /usr/local/lsws/bin/lswsctrl restart
#
# Option C — OLS WebAdmin GUI:
#   1. CyberPanel → Websites → isplatty.org → vHost Conf
#   2. Paste extProcessor + context blocks below
#   3. Save → Graceful Restart
################################################################


# ── Node.js API reverse proxy ──────────────────────────────

extProcessor node_api {
    type                    proxy
    address                 127.0.0.1:8080
    maxConns                100
    initTimeout             60
    retryTimeout            0
    respBuffer              0
}

context /api/ {
    type                    proxy
    handler                 node_api
    addDefaultCharset       off
}


# ── SPA rewrite — all non-file requests → index.html ───────
# This makes React Router work (direct URL access / page refresh)

rewrite  {
    enable                  1
    autoLoadHtaccess        1
    rules                   <<<END_RULES
RewriteEngine On
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ /index.html [L]
END_RULES
}
