################################################################
# OcholaSupernet — OpenLiteSpeed Proxy Context
#
# In CyberPanel → Websites → your-domain → vHost Conf
# Paste the <context> block below (or add via OLS WebAdmin).
#
# This proxies /api/ requests to the PM2 Node.js process
# running on port 8080, and rewrites everything else to the
# React SPA index.html for client-side routing.
################################################################

# ── Paste this into your vHost config ──────────────────────

# Node.js API reverse proxy
context /api/ {
    type                    proxy
    handler                 node_api
    addDefaultCharset       off
}

extProcessor node_api {
    type                    proxy
    address                 127.0.0.1:8080
    maxConns                100
    initTimeout             60
    retryTimeout            0
    respBuffer              0
}

# SPA rewrite — all non-file requests → index.html
rewrite  {
    enable                  1
    autoLoadHtaccess        1
    rules                   <<<END_RULES
RewriteEngine On
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ /index.html [L]
END_RULES
}

################################################################
# HOW TO APPLY IN CYBERPANEL
#
# Option A — CyberPanel WebAdmin GUI (easiest):
#   1. Log in to CyberPanel → Websites → List Websites
#   2. Click "Manage" on your domain
#   3. Click "vHost Conf" (opens OLS WebAdmin Console)
#   4. Under "Virtual Hosts" → your domain → "General"
#   5. Paste the extProcessor and context blocks above
#   6. Click "Save" and then "Graceful Restart" in OLS
#
# Option B — Edit the file directly:
#   sudo nano /usr/local/lsws/conf/vhosts/YOUR_DOMAIN/vhost.conf
#   Paste the extProcessor and context blocks, then:
#   sudo /usr/local/lsws/bin/lswsctrl restart
#
# Option C — CyberPanel Node.js Apps (simplest):
#   1. CyberPanel → Node.js Apps → Create Application
#   2. Application Root: /home/<user>/YOUR_DOMAIN/
#   3. Application URL: /api/
#   4. Application Startup File: artifacts/api-server/dist/index.mjs
#   5. CyberPanel auto-creates the OLS proxy context for you!
################################################################
