        <p class="text-slate-400 text-sm mt-1">Remotely manage your MikroTik devices</p>
      </div>

      <div class="rounded-2xl border border-white/8 overflow-hidden" style="background:#161b22">

              <p class="text-[10px] text-slate-600">Port 22 access to router CLI</p>
              <button class="mt-3 text-[11px] text-cyan-400 border border-cyan-500/25 rounded-lg px-3 py-1.5 hover:bg-cyan-500/5 transition">Configure</button>
            </div>
            <div class="rounded-xl border border-white/6 p-4 text-center" style="background:#0d1117">
              <p class="text-xs font-semibold text-slate-400 mb-2">Winbox</p>
              <p class="text-[10px] text-slate-600">Port 8291 MikroTik Winbox</p>
              <button class="mt-3 text-[11px] text-cyan-400 border border-cyan-500/25 rounded-lg px-3 py-1.5 hover:bg-cyan-500/5 transition">Configure</button>
            </div>
            <div class="rounded-xl border border-white/6 p-4 text-center" style="background:#0d1117">
              <p class="text-xs font-semibold text-slate-400 mb-2">API</p>
