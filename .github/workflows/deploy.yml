name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: VITE_SUPABASE_URL,VITE_SUPABASE_KEY,SUPABASE_SERVICE_ROLE_KEY
          script: |
            set -e
            echo "=== Starting deploy at $(date) ==="
            cd /var/www/ocholasupernet

            # Inject Supabase credentials into .env so PM2 always has them
            # (safe even if already set — idempotent upsert)
            upsert_env() {
              local key="$1" val="$2"
              [ -z "$val" ] && return
              grep -q "^${key}=" .env 2>/dev/null \
                && sed -i "s|^${key}=.*|${key}=${val}|" .env \
                || echo "${key}=${val}" >> .env
              echo "  ✓ ${key} written to .env"
            }

            touch .env
            upsert_env "VITE_SUPABASE_URL"        "$VITE_SUPABASE_URL"
            upsert_env "VITE_SUPABASE_KEY"         "$VITE_SUPABASE_KEY"
            upsert_env "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_ROLE_KEY"

            bash deploy/deploy.sh
            echo "=== Deploy finished at $(date) ==="
        env:
          VITE_SUPABASE_URL:        ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY:        ${{ secrets.VITE_SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
