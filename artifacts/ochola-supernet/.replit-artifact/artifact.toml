kind = "web"
previewPath = "/"
title = "OcholaSupernet"
version = "1.0.0"
id = "artifacts/ochola-supernet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21955

[services.development]
run = "pnpm --filter @workspace/ochola-supernet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ochola-supernet", "run", "build" ]
publicDir = "artifacts/ochola-supernet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21955"
BASE_PATH = "/"
