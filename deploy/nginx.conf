##############################################################
# OcholaSupernet — nginx reverse proxy for isplatty.org
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/isplatty
#   sudo ln -s /etc/nginx/sites-available/isplatty \
#              /etc/nginx/sites-enabled/isplatty
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get free HTTPS:
#   sudo certbot --nginx -d isplatty.org -d www.isplatty.org
##############################################################

# Redirect www → non-www (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name www.isplatty.org;
    return 301 http://isplatty.org$request_uri;
}

# Main HTTP server → reverse proxy to app on port 8080
server {
    listen 80;
    listen [::]:80;
    server_name isplatty.org;

    # After certbot, uncomment the line below and remove the proxy block above
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}

